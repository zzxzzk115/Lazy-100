name: Release Prebuilt

# Package the console host (lazy100) + host tools (cartshot, cartwav) for each desktop
# platform and attach the zips to the GitHub release. Publish a release (or dispatch with
# a tag) to run it — same flow as vshadersystem's release_prebuilt.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-prebuilt:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            plat: windows
            arch: x64
            artifact_suffix: windows-x64
          - os: ubuntu-latest
            plat: linux
            arch: x86_64
            artifact_suffix: linux-x86_64
          # Raspberry Pi 4/5 (64-bit OS): GitHub's native arm64 runner, no cross toolchain.
          - os: ubuntu-24.04-arm
            plat: linux
            arch: arm64
            artifact_suffix: linux-arm64
          # 32-bit ARM (Pi 2/3 or 32-bit OS): native armv7 build inside an arm32v7 container
          # on the arm64 runner — no cross toolchain, so xmake package/system detection all
          # behaves exactly like a real 32-bit box. fail-fast is off, so a failure here never
          # blocks the other platforms' assets.
          - os: ubuntu-24.04-arm
            plat: linux
            arch: armv7
            artifact_suffix: linux-armv7
            container: armv7
          - os: macos-latest
            plat: macosx
            arch: arm64
            artifact_suffix: macosx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          submodules: recursive

      - uses: xmake-io/github-action-setup-xmake@v1
        if: ${{ !matrix.container }}
        with:
          xmake-version: latest
          actions-cache-folder: ".xmake-cache"
          build-cache: true

      - name: Install Linux Dependencies
        if: ${{ matrix.plat == 'linux' && !matrix.container }}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev libxfixes-dev \
            libxss-dev libwayland-dev libxkbcommon-dev libdecor-0-dev \
            libegl1-mesa-dev libgl1-mesa-dev libvulkan-dev \
            libasound2-dev libpulse-dev libdbus-1-dev libudev-dev libdrm-dev libgbm-dev

      - name: Configure
        if: ${{ !matrix.container }}
        run: xmake f -m release -p ${{ matrix.plat }} -a ${{ matrix.arch }} --lazy100_build_tests=n --policies=build.ccache:y -y

      - name: Build console + tools
        if: ${{ !matrix.container }}
        run: |
          git config --global pull.rebase false
          xmake repo -u
          # one target per invocation: xmake's build command takes a single target,
          # and the tools are set_default(false) so a bare `xmake` skips them
          xmake build -y lazy100
          xmake build -y cartshot
          xmake build -y cartwav

      - name: Build in armv7 container
        if: ${{ matrix.container == 'armv7' }}
        run: |
          # qemu binfmt as a fallback in case the arm64 host CPU lacks AArch32 support.
          sudo apt-get update && sudo apt-get install -y qemu-user-static binfmt-support
          # setarch linux32 wraps everything so uname reports a 32-bit machine (armv8l) to
          # xmake's host detection and every package configure script.
          docker run --rm --platform linux/arm/v7 -v "$PWD:/work" -w /work arm32v7/ubuntu:24.04 \
            setarch linux32 bash -euo pipefail -c '
              export DEBIAN_FRONTEND=noninteractive XMAKE_ROOT=y
              apt-get update
              apt-get install -y build-essential cmake ninja-build pkg-config git curl unzip \
                ca-certificates util-linux \
                libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev libxfixes-dev \
                libxss-dev libwayland-dev libxkbcommon-dev libdecor-0-dev \
                libegl1-mesa-dev libgl1-mesa-dev libvulkan-dev \
                libasound2-dev libpulse-dev libdbus-1-dev libudev-dev libdrm-dev libgbm-dev \
                libcurl4-openssl-dev
              git config --global --add safe.directory "*"
              git config --global pull.rebase false
              # no prebuilt xmake for armv7: build it from source. Straight from GitHub —
              # the official installer script picks its mirror by network probing and can
              # wander off to gitee (CN mirror) with a broken version string on CI runners.
              git clone --depth 1 --recursive https://github.com/xmake-io/xmake.git /tmp/xmake-src
              cd /tmp/xmake-src
              ./configure
              make -j"$(nproc)"
              make install PREFIX="$HOME/.local"
              cd /work
              export PATH="$HOME/.local/bin:$PATH"
              xmake --version
              xmake f -m release -p linux -a armv7 --lazy100_build_tests=n -y
              xmake build -y lazy100
              xmake build -y cartshot
              xmake build -y cartwav
              chmod -R a+rw build
            '

      - name: Package Bundle
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.event.release.tag_name || inputs.tag }}"
          NAME="lazy100-${VERSION}-${{ matrix.artifact_suffix }}"
          STAGE="prebuilt/${NAME}"
          OUT="build/${{ matrix.plat }}/${{ matrix.arch }}/release"
          mkdir -p "${STAGE}"

          EXE=""; [ "${{ matrix.plat }}" = "windows" ] && EXE=".exe"
          cp "${OUT}/lazy100${EXE}"  "${STAGE}/"
          cp "${OUT}/cartshot${EXE}" "${STAGE}/"
          cp "${OUT}/cartwav${EXE}"  "${STAGE}/"
          cp LICENSE "${STAGE}/LICENSE"
          cp README.md "${STAGE}/README.md"
          cp -R docs "${STAGE}/docs"

          cmake -E tar cfv "prebuilt/${NAME}.zip" --format=zip "${STAGE}"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-${{ matrix.artifact_suffix }}
          path: prebuilt/*.zip

  upload-release-assets:
    needs: build-prebuilt
    if: ${{ !cancelled() }} # publish whatever platforms succeeded
    runs-on: ubuntu-latest

    steps:
      - name: Download All Zips
        uses: actions/download-artifact@v4
        with:
          path: prebuilt_assets

      - name: Publish Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: prebuilt_assets/**/*.zip
