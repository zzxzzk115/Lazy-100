name: Deploy Site Pages

# Publish the Lazy-100 web console + carts browser to GitHub Pages.
# Push to the `doc` branch (or run manually) to build the wasm console and deploy the site.
on:
  push:
    branches: [doc]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: ".xmake-cache"
          build-cache: true

      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build pkg-config

      - name: Verify toolchains
        run: emcc -v && xmake --version

      - name: Build wasm console + assemble site
        run: bash scripts/build_site.sh "$GITHUB_WORKSPACE/site"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: https://zzxzzk115.github.io/Lazy-100/
    runs-on: ubuntu-latest
    needs: build
    steps:
      # The Pages API intermittently rejects deployments with a transient "Deployment failed,
      # try again later" — sometimes more than once in a row. Three attempts with backoff.
      - name: Deploy to GitHub Pages
        id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 15

      - name: Deploy (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 2
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 30

      - name: Deploy (attempt 3)
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
